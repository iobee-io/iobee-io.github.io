  <text x="108" y="110" fill="#E2EBFF" font-family="Space Grotesk, Arial" font-size="46">Arquitetura unica da iobee</text>
  <text x="108" y="154" fill="#A8BCDF" font-family="IBM Plex Sans, Arial" font-size="23">Bees capturam no campo, Pollen transporta sinais, Hive orquestra e ICOS gera inteligencia operacional.</text>
  <text x="108" y="184" fill="#92E6D1" font-family="IBM Plex Sans, Arial" font-size="18">Guard atua de forma transversal protegendo todas as camadas.</text>

